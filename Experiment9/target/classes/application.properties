# H2 Database Configuration (for testing without MySQL)
spring.datasource.url=jdbc:h2:mem:jwtdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT Configuration - Use a strong 256-bit secret in production
jwt.secret=mySecretKey1234567890123456789012345678901234567890123456789012345678901234
jwt.expiration=86400000

# Server Configuration
server.port=8080
